[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude = .git,__pycache__,build,dist,.venv,venv,models,data

[isort]
profile = black
line_length = 100
known_first_party = src
known_third_party = torch,transformers,fastapi,streamlit,pandas,numpy,sklearn,plotly

[tool:black]
# Note: black config goes in pyproject.toml, but kept here for reference
